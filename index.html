<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Premium Instagram Status</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Poppins', sans-serif;
      /* Instagram Gradient Background */
      background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: white;
      text-align: center;
      padding: 20px;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .header-container {
      margin-bottom: 30px;
      animation: fadeInDown 1s ease;
    }

    .logo {
      font-size: 60px;
      margin-bottom: 10px;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
    }

    h1 {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: 1px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.4);
    }

    /* Glassmorphism Card Effect */
    #status-container {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 20px;
      padding: 40px 30px;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
      transition: transform 0.3s ease;
      animation: fadeInUp 1s ease;
    }

    #status-text {
      font-size: 24px;
      font-weight: 600;
      line-height: 1.5;
      margin-bottom: 30px;
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-group {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      justify-content: center;
    }

    button {
      background: rgba(255, 255, 255, 0.9);
      color: #dc2743;
      border: none;
      padding: 12px 25px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    button:hover {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      background: #ffffff;
    }

    button:active {
      transform: translateY(1px);
    }

    #whatsapp-btn {
      background: #25D366;
      color: white;
    }

    #whatsapp-btn:hover {
      background: #20b858;
    }

    /* Animations */
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .fade-text {
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* Toast Notification */
    #toast {
      visibility: hidden;
      min-width: 250px;
      background-color: #333;
      color: #fff;
      text-align: center;
      border-radius: 50px;
      padding: 12px 20px;
      position: fixed;
      z-index: 1;
      bottom: 30px;
      font-size: 15px;
      opacity: 0;
      transition: opacity 0.3s, bottom 0.3s;
    }

    #toast.show {
      visibility: visible;
      opacity: 1;
      bottom: 50px;
    }

  </style>
</head>
<body>

  <div class="header-container">
    <div class="logo"><i class="fa-brands fa-instagram"></i></div>
    <h1>Top Instagram Status</h1>
  </div>

  <div id="status-container">
    <div id="status-text">ज़िन्दगी छोटी है मुस्कुराना सीखो 😊</div>
    
    <div class="btn-group">
      <button id="next-btn" onclick="nextStatus()">
        <i class="fa-solid fa-forward-step"></i> Next
      </button>
      
      <button id="copy-btn" onclick="copyStatus()">
        <i class="fa-solid fa-copy"></i> Copy
      </button>
      
      <button id="whatsapp-btn" onclick="shareWhatsApp()">
        <i class="fa-brands fa-whatsapp"></i> WhatsApp
      </button>

      <button id="share-btn" onclick="shareNative()">
        <i class="fa-solid fa-share-nodes"></i> Share
      </button>
    </div>
  </div>

  <div id="toast">Status Copied! 🎉</div>

<script>
  const statusTextElement = document.getElementById('status-text');
  
  const statuses = [
    "ज़िन्दगी छोटी है मुस्कुराना सीखो 😊",
    "Attitude अपना अलग है 😉",
    "दिल से ज्यादा भरोसा तोड़ने वाला कोई नहीं 💔",
    "ख्वाब बड़े हैं, हिम्मत भी पूरी है 💪",
    "ज़माना क्या सोचेगा ये मत सोचो 😎",
    "हम वही करते हैं जो दिल कहे ❤️",
    "Smile करो, दुनिया जल जाएगी 🔥",
    "Single रहकर मस्त हैं हम 😜",
    "कदर कर लो उनकी जो बिना मतलब के भी साथ हैं 🤗",
    "खुद की कीमत समझो 💯",
    "दिखावा नहीं, असली हूँ मैं 🤘",
    "मौसम बदल रहा है, दोस्त नहीं 😊",
    "ज़िन्दगी अपनी शर्तों पर जीते हैं 🚀",
    "अपने दम पर जीना सीखो 💪",
    "कुछ तो लोग कहेंगे, लोगों का काम है कहना 😅",
    "अंदाज़ हमारा खास है 😎",
    "चुप रहना भी एक कला है 🤫",
    "अपना time आएगा ⏳"
  ];

  let currentIndex = 0;

  // Initial load
  statusTextElement.textContent = statuses[currentIndex];

  function nextStatus() {
    currentIndex = Math.floor(Math.random() * statuses.length); // Random status
    
    // Add fade animation
    statusTextElement.classList.remove('fade-text');
    void statusTextElement.offsetWidth; // trigger reflow
    statusTextElement.classList.add('fade-text');
    
    statusTextElement.textContent = statuses[currentIndex];
  }

  function copyStatus() {
    const text = statuses[currentIndex];
    navigator.clipboard.writeText(text).then(() => {
      showToast();
    });
  }

  function shareWhatsApp() {
    const text = statuses[currentIndex];
    const url = window.location.href;
    const whatsappUrl = `https://api.whatsapp.com/send?text=${encodeURIComponent(text + "\n\nGet more: " + url)}`;
    window.open(whatsappUrl, '_blank');
  }

  function shareNative() {
    const text = statuses[currentIndex];
    if (navigator.share) {
      navigator.share({
        title: "Instagram Status",
        text: text,
        url: window.location.href
      }).catch(err => console.error("Share failed:", err));
    } else {
      copyStatus(); // Fallback to copy if share not supported
      alert("Share feature not supported. Status copied to clipboard!");
    }
  }

  function showToast() {
    const toast = document.getElementById("toast");
    toast.className = "show";
    setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
  }
</script>

</body>
</html>
