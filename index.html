      --glass: rgba(255, 255, 255, 0.1);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #000;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      overflow: hidden;

    /* Animated Dynamic Background */
    .bg-glow {
      position: absolute;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 10% 20%, #405de6 0%, transparent 40%),
                  radial-gradient(circle at 90% 80%, #fd1d1d 0%, transparent 40%);
      filter: blur(100px);
      z-index: -1;
      animation: pulse 8s infinite alternate;
    }
    @keyframes pulse { from { transform: scale(1); opacity: 0.5; } to { transform: scale(1.3); opacity: 0.8; } }

    .card {
      width: 90%;
      max-width: 400px;
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 30px;
      padding: 40px 25px;
      text-align: center;
      box-shadow: 0 25px 50px rgba(0,0,0,0.6);
    }
    .insta-logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
      background: url('https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png') center/contain no-repeat;
      filter: drop-shadow(0 0 10px rgba(255,255,255,0.4));
    }
    h1 { font-size: 24px; font-weight: 800; margin-bottom: 5px; letter-spacing: 1px; }
    .subtitle { font-size: 13px; opacity: 0.6; margin-bottom: 30px; }

    #main-content { display: none; animation: fadeIn 0.8s ease forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

    .status-display {
      background: rgba(0,0,0,0.4);
      padding: 25px;
      border-radius: 20px;
      min-height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 600;
      line-height: 1.4;
      margin-bottom: 25px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.3s;
      text-transform: uppercase;
    }
    .btn-main { background: var(--insta-grad); color: white; box-shadow: 0 10px 20px rgba(220, 39, 67, 0.3); }
    .btn-main:active { transform: scale(0.95); }
    
    .btn-sub { background: rgba(255,255,255,0.1); color: white; margin-top: 12px; border: 1px solid rgba(255,255,255,0.2); }

    .footer { margin-top: 30px; font-size: 11px; opacity: 0.4; letter-spacing: 2px; }
